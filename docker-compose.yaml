# These values should be changed to secure your installation
x-database-password: &db_password "root"
x-pgadmin-password: &pgadmin_password "root"
x-jwt-secret: &jwt_secret "CHANGE ME"
x-interservice-authentication-key: &interservice_authentication_key "CHANGE ME"

# Update these variables to your desired defaults. The username stuff isn't exactly "implemented"
# (authentication exists, but there's no UI for it yet), but they're here for future use. There 
# might be issues down the line if you don't change them before running this for the first time.
# Think of them as intelligent placeholders.
x-default-user-name: &default_user_name "dev-test"
x-default-user-email: &default_user_email "dev-test@example.com"
x-default-user-password: &default_user_password "password"

# The rest of these strings are environment variables for the containers. Modify as needed,
# but keep in mind that some are used relevant when *building* the images (like the VITE_* vars
# for the client), while others are used at runtime.
x-base-environment: &base_env
  TZ: "America/Los_Angeles"
  NODE_ENV: "production"

# Used when locally building the client image. Release builds inject the validated
# package.json version from CI, while this compose file intentionally defaults to
# a local fallback and continues tracking the published :latest images by default.
x-client-args: &client_env
  VITE_VERSION: "${VITE_VERSION:-0.0.0}"
  VITE_API_SERVER_URL: ""

x-server-environment: &server_env
  <<: 
    - *base_env
  LOG_DEBUG: "false"
  DEFAULT_USER: *default_user_name
  DEFAULT_USER_EMAIL: *default_user_email
  DEFAULT_USER_PASSWORD: *default_user_password
  AUTHENTICATION_ENABLED: "false"
  JWT_SECRET: *jwt_secret
  JWT_EXPIRATION: "259200000"
  DATABASE_HOST: "127.0.0.1"
  DATABASE_PORT: "5432"
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: *db_password
  INTERSERVICE_AUTHENTICATION_KEY: *interservice_authentication_key
  BACKUP_RETENTION_DAYS: "30"

services:
  server:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Release automation publishes both :latest and the validated semver tag.
    # Compose defaults to :latest unless an operator overrides the image tag.
    image: ghcr.io/ipswich/sproot-server:latest
    build:
      context: ./
      dockerfile: ./server/Dockerfile
    environment: *server_env
    volumes:
      - /run/udev:/run/udev:ro
      - /sys:/sys
      - ./docker_volumes/sproot/server/logs:/sproot/server/logs
      - ./docker_volumes/sproot/server/images:/sproot/server/images
      - ./docker_volumes/sproot/server/certs:/sproot/server/certs
      - ./docker_volumes/sproot/server/backups:/sproot/server/backups
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    group_add:
      - dialout
    tty: true
    network_mode: "host"
    expose:
      - "3000"
    privileged: true
  
  client:
    restart: unless-stopped
    depends_on:
      - server
    # The published "client" image is built from gateway/Dockerfile and also
    # receives both :latest and the validated semver tag during release.
    image: ghcr.io/ipswich/sproot-client:latest
    build:
      context: ./
      dockerfile: ./gateway/Dockerfile
      args: *client_env
    environment: *base_env
    volumes:
      - ./docker_volumes/sproot/gateway/logs:/sproot/logs
    network_mode: "host"
    expose:
      - "80"

  postgres:
    image: timescale/timescaledb:2.26.4-pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: *db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./docker_volumes/postgresql:/var/lib/postgresql
    network_mode: "host"
    expose:
      - "5432"

  pgadmin:
    image: dpage/pgadmin4:9.14.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
          if [ -n "$${PGADMIN_SERVER_JSON:-}" ] && { [ ! -f "$${PGADMIN_SERVER_JSON_FILE:-/tmp/servers.json}" ] || [ "$${PGADMIN_REPLACE_SERVERS_ON_STARTUP:-}" = "True" ]; }; then
            printf '%s\n' "$$PGADMIN_SERVER_JSON" > "$${PGADMIN_SERVER_JSON_FILE:-/tmp/servers.json}"
          fi
          exec /entrypoint.sh "$@"
    network_mode: "host"
    environment:
      PGADMIN_LISTEN_PORT: 3001
      PGADMIN_DEFAULT_EMAIL: admin@local.host
      PGADMIN_DEFAULT_PASSWORD: *pgadmin_password
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: 'True'
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_DISABLE_POSTFIX: 'True'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 30
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: 'False'
      PGADMIN_CONFIG_CHECK_SUPPORTED_BROWSER: 'False'
      PGADMIN_CONFIG_ALLOW_SAVE_PASSWORD: 'True'
      PGADMIN_SERVER_JSON: |
        {
          "Servers": {
            "1": {
              "Name": "Sproot",
              "Group": "Servers",
              "Host": "127.0.0.1",
              "Port": 5432,
              "MaintenanceDB": "postgres",
              "Username": "postgres",
              "SSLMode": "prefer"
            }
          }
        }
    volumes:
      - pgadmin_runtime:/var/lib/pgadmin

volumes:
  pgadmin_runtime: