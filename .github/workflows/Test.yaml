name: "Verify and Test"

on:
  push:
    branches: ["**"]

env:
  NODE_VERSION: 24.13.1

  # Server configuration
  TZ: America/Los_Angeles
  NODE_ENV: test
  DEFAULT_USER: dev-test
  DEFAULT_USER_EMAIL: dev-test@example.com
  DEFAULT_USER_PASSWORD: password
  AUTHENTICATION_ENABLED: false
  JWT_SECRET: Default
  JWT_EXPIRATION: 259200000
  DATABASE_CLIENT: mysql2
  DATABASE_HOST: 127.0.0.1
  DATABASE_PORT: 3306
  DATABASE_USER: root
  DATABASE_PASSWORD: root
  INTERSERVICE_AUTHENTICATION_KEY: test
  BACKUP_RETENTION_DAYS: 30

jobs:
  prettier:
    name: Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check code style
        run: npm run prettier:check

  # Depends on prettier finishing successfully
  test-mysql:
    needs: prettier
    name: Run MySQL Tests (Node ${{ matrix.node-version }}) ${{ matrix.experimental && '(experimental)' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 24.13.1
            experimental: false
          # - node-version: 22.x
          #   experimental: true

    services:
      db:
        image: mariadb:11.5.2-noble
        env:
          MARIADB_ROOT_PASSWORD: ${{ env.DATABASE_PASSWORD }}
        ports:
          - 3306:3306
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Run API tests
        run: npm run test:api

  test-postgres:
    needs: prettier
    name: Run PostgreSQL Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_CLIENT: pg
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Run API tests
        run: npm run test:api

  test-bridge:
    needs: prettier
    name: Run Bridge Migration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      db:
        image: mariadb:11.5.2-noble
        env:
          MARIADB_ROOT_PASSWORD: ${{ env.DATABASE_PASSWORD }}
        ports:
          - 3306:3306
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Run bridge migration tests
        env:
          BRIDGE_TEST_TARGET_USER: postgres
          BRIDGE_TEST_TARGET_PASSWORD: postgres
        run: npm run test:bridge --workspace=server
