name: "Verify and Test"

on:
  push:
    branches: ["**"]

env:
  NODE_VERSION: 24.13.1

  # Server configuration
  TZ: America/Los_Angeles
  NODE_ENV: test
  DEFAULT_USER: dev-test
  DEFAULT_USER_EMAIL: dev-test@example.com
  DEFAULT_USER_PASSWORD: password
  AUTHENTICATION_ENABLED: false
  JWT_SECRET: Default
  JWT_EXPIRATION: 259200000
  DATABASE_HOST: 127.0.0.1
  DATABASE_PORT: 5432
  DATABASE_USER: postgres
  DATABASE_PASSWORD: postgres
  INTERSERVICE_AUTHENTICATION_KEY: test
  BACKUP_RETENTION_DAYS: 30

permissions:
  contents: read
 
jobs:
  prettier:
    name: Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check code style
        run: npm run prettier:check

  test:
    needs: prettier
    name: Run Tests (Node ${{ matrix.node-version }}) ${{ matrix.experimental && '(experimental)' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: ${{ matrix.experimental }}
    env:
      BRIDGE_TEST_SOURCE_HOST: 127.0.0.1
      BRIDGE_TEST_SOURCE_PORT: 3306
      BRIDGE_TEST_SOURCE_USER: root
      BRIDGE_TEST_SOURCE_PASSWORD: root
      BRIDGE_TEST_TARGET_HOST: 127.0.0.1
      BRIDGE_TEST_TARGET_PORT: 5432
      BRIDGE_TEST_TARGET_USER: postgres
      BRIDGE_TEST_TARGET_PASSWORD: postgres
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 24.13.1
            experimental: false
          # - node-version: 22.x
          #   experimental: true
    services:
      postgres:
        image: timescale/timescaledb:2.26.4-pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install PostgreSQL 18 client
        run: |
          set -e
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo "$VERSION_CODENAME")-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Run API tests
        run: npm run test:api